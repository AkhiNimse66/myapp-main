<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- Coin mark: thin circle with ₹ inside -->
  <circle cx="32" cy="32" r="28" stroke="#0A0A0A" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="22" stroke="#0A0A0A" stroke-width="0.5"/>
  <!-- ₹ glyph centered in coin -->
  <text x="32" y="40"
    font-family="'Instrument Serif', Georgia, serif"
    font-size="22"
    font-style="italic"
    fill="#0A0A0A"
    text-anchor="middle"
    dominant-baseline="auto">₹</text>
  <!-- Wordmark -->
  <text x="72" y="38"
    font-family="'Instrument Serif', Georgia, serif"
    font-size="28"
    font-weight="400"
    fill="#0A0A0A"
    letter-spacing="-0.5"
    dominant-baseline="auto">athanni</text>
</svg>
